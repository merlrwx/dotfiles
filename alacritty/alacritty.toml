[font]
size = 17

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[window]
decorations = "none"

[window.padding]
x = 7
y = 0

[general]
import = ["~/.config/alacritty/themes/themes/gruvbox_dark.toml"]

[terminal.shell]
program = "tmux"
